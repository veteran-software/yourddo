name: YourDDO - Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Enable Corepack
      run: corepack enable

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.1'
        cache-dependency-path: tools/*/go.mod

    - name: Install dependencies
      run: yarn install

    - name: Prebuild
      run: yarn prebuild

    - name: Lint
      run: yarn lint

    - name: Type check
      run: yarn build # Since the 'build' script runs 'tsc -b && vite build', it includes type checking

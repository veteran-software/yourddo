version: 1
frontend:
  phases:
    preBuild:
      runtime-versions:
        go: 1.x
        nodejs: 24.x
      commands:
        - corepack enable
        - yarn install
        - yarn run prebuild
    build:
      commands:
        - yarn run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
